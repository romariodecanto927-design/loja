<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Boutique | Elegância & Estilo</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --primary: #1a1a1a;
            --secondary: #f4f4f4;
            --accent: #c5a059; /* Tom dourado para elegância */
            --text: #333;
            --light-text: #777;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: #ffffff; 
            color: var(--text);
            line-height: 1.6;
        }

        /* Header Elegante */
        header {
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 15px 8%; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #eee;
        }

        .logo { 
            font-family: 'Playfair Display', serif;
            font-size: 28px; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-actions { display: flex; gap: 20px; align-items: center; }

        .search-bar {
            padding: 8px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            outline: none;
            transition: 0.3s;
            background: var(--secondary);
        }

        .search-bar:focus { border-color: var(--accent); width: 220px; }

        .btn-icon {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            position: relative;
            color: var(--primary);
        }

        .badge {
            position: absolute;
            top: -5px;
            right: -10px;
            background: var(--accent);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 50%;
        }

        /* Banner Minimalista */
        .hero {
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1400&q=80') center/cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
        }

        .hero h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 3.5rem; 
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        /* Seção de Produtos */
        .container { padding: 60px 8%; }

        .section-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-title h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
        }

        .section-title h2::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 2px;
            background: var(--accent);
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px;
        }

        .card {
            background: #fff;
            overflow: hidden;
            transition: 0.4s;
            border: none;
            text-align: left;
        }

        .img-container {
            overflow: hidden;
            background: var(--secondary);
            aspect-ratio: 3/4;
            margin-bottom: 15px;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.6s;
        }

        .card:hover img { transform: scale(1.08); }

        .card h3 { font-size: 1.1rem; margin: 10px 0 5px; font-weight: 400; }
        .card .price { color: var(--accent); font-weight: 600; font-size: 1.2rem; }

        .btn-add {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #fff;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add:hover { background: var(--accent); }

        /* Carrinho Lateral */
        .cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 350px;
            height: 100%;
            background: #fff;
            box-shadow: -5px 0 30px rgba(0,0,0,0.1);
            z-index: 2000;
            transition: 0.4s;
            padding: 30px;
        }

        .cart-sidebar.active { right: 0; }

        /* Footer */
        footer {
            background: var(--secondary);
            padding: 80px 8% 40px;
            text-align: center;
        }

        .social-links {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.btn-social {
    text-decoration: none;
    color: var(--primary);
    font-size: 0.9rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 15px 30px;
    border: 1px solid #e0e0e0; /* Borda fina e elegante */
    transition: all 0.4s ease;
    display: inline-block;
    min-width: 200px;
}

.btn-social:hover {
    border-color: var(--accent);
    color: var(--accent);
    background-color: #fff;
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
  
        }

        .social-links a:hover { border-color: var(--accent); color: var(--accent); }

    </style>
</head>
<body>

<header>
    <div class="logo">Premium</div>
    <div class="nav-actions">
        <input type="text" id="search" class="search-bar" placeholder="O que você procura?" onkeyup="searchProduct()">
        <button class="btn-icon" onclick="toggleCart()">
            🛒 <span id="count" class="badge">0</span>
        </button>
        <button class="btn-add" style="margin:0; width:auto; padding: 8px 20px;" onclick="login()">Login</button>
    </div>
</header>

<div class="hero">
    <h1>NEW COLLECTION</h1>
    <p>A definição de sofisticação em cada detalhe.</p>
</div>

<div class="container">
    <div class="section-title">
        <h2>Destaques da Temporada</h2>
    </div>

    <div class="filters" style="margin-bottom: 30px; text-align: right;">
        <select onchange="sortProducts(this.value)" style="padding: 10px; border: 1px solid #eee; border-radius: 5px;">
            <option value="">Ordenar por</option>
            <option value="asc">Menor Preço</option>
            <option value="desc">Maior Preço</option>
        </select>
    </div>

    <div class="grid" id="products"></div>
</div>

<div class="cart-sidebar" id="cart">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h3 style="font-family: 'Playfair Display', serif;">Seu Carrinho</h3>
        <button onclick="toggleCart()" style="background:none; border:none; cursor:pointer; font-size: 1.5rem;">&times;</button>
    </div>
    <div id="cart-content"></div>
</div>

<footer>
    <div class="section-title" style="margin-bottom: 30px;">
        <h2 style="font-size: 1.5rem;">Conecte-se Conosco</h2>
    </div>
    
    <div class="social-links">
        <a href="https://www.instagram.com/wearjeeans?igsh=MWxlcnp4NGNyc3ZwNw==" target="_blank" class="btn-social">
            <span>📸 Instagram</span>
        </a>
        
        <a href="https://wa.me/556798062090?text=Olá! Gostaria de saber mais sobre os produtos." target="_blank" class="btn-social">
            <span>💬 WhatsApp Especialista</span>
        </a>
    </div>
    
    <p style="margin-top: 40px; color: #999; font-size: 0.8rem; letter-spacing: 1px;">
        &copy; 2026 PREMIUM BOUTIQUE | ATENDIMENTO EXCLUSIVO
    </p>
</footer>

<script>
// Configuração Firebase (Mantenha suas chaves aqui)
const firebaseConfig = {
  apiKey: "AIzaSyCjj_gmVMDgM6p3E7vQvrygL6mje21vA4k",
  authDomain: "loja-de-roupas-fcffd.firebaseapp.com",
  projectId: "loja-de-roupas-fcffd",
  storageBucket: "loja-de-roupas-fcffd.appspot.com",
  messagingSenderId: "802422003746",
  appId: "1:802422003746:web:750d5505d642b5dbb8127b"
};

const app = firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
  
let cart = [];

const products = [
    {name:"Suéter Cashmere", price:450, img:"https://images.unsplash.com/photo-1576566588028-4147f3842f27?auto=format&fit=crop&w=500&q=80"},
    {name:"Relógio Minimalist", price:1200, img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=500&q=80"},
    {name:"Óculos de Sol Avidor", price:890, img:"https://images.unsplash.com/photo-1572635196237-14b3f281503f?auto=format&fit=crop&w=500&q=80"},
    {name:"Bolsa Couro Italiano", price:2300, img:"https://images.unsplash.com/photo-1584917033904-74112448375e?auto=format&fit=crop&w=500&q=80"}
];

function render(list) {
    const el = document.getElementById('products');
    el.innerHTML = ''; 
    list.forEach((p, i) => {
        el.innerHTML += `
        <div class="card">
            <div class="img-container">
                <img src="${p.img}" alt="${p.name}">
            </div>
            <h3>${p.name}</h3>
            <p class="price">R$ ${p.price.toLocaleString('pt-BR')}</p>
            <button class="btn-add" onclick="addCart(${i})">Adicionar à Sacola</button>
        </div>
        `;
    });
}

function addCart(i) {
    cart.push(products[i]);
    document.getElementById('count').innerText = cart.length;
    renderCart();
    if(!document.getElementById('cart').classList.contains('active')) toggleCart();
}

function renderCart() {
    const el = document.getElementById('cart-content');
    el.innerHTML = '';
    if(cart.length === 0) el.innerHTML = '<p style="color:#999">Sua sacola está vazia.</p>';
    cart.forEach(p => {
        el.innerHTML += `
            <div style="display:flex; gap:15px; margin-bottom:20px; border-bottom:1px solid #eee; padding-bottom:10px;">
                <div style="font-weight:600; font-size:0.9rem;">${p.name} <br> <span style="color:var(--accent)">R$ ${p.price}</span></div>
            </div>
        `;
    });
}

function toggleCart() {
    document.getElementById('cart').classList.toggle('active');
}

function sortProducts(order) {
    let sorted = [...products];
    if(order === 'asc') sorted.sort((a,b) => a.price - b.price);
    if(order === 'desc') sorted.sort((a,b) => b.price - a.price);
    render(sorted);
}

function searchProduct() {
    const val = document.getElementById('search').value.toLowerCase();
    const filtered = products.filter(p => p.name.toLowerCase().includes(val));
    render(filtered);
}

function login() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
        .then(() => alert('Seja bem-vindo(a)'))
        .catch((error) => console.error(error));
}

render(products);
</script>

</body>
</html>
